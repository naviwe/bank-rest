server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/card_management
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/migration/db.changelog-master.yaml
    enabled: true

logging:
  level:
    org.hibernate.SQL: DEBUG